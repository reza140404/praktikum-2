<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Moment Foto - Ceria</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
            padding-top: 80px;
        }

        nav {
            background: #333;
            color: white;
            position: fixed;
            width: 100%;
            top: 0;
            padding: 15px 30px;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #ffcc00;
        }

        .galeri-container {
            display: flex;
            justify-content: center;
        }

        .galeri {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 40px;
        }

        .galeri img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .galeri img:hover {
            transform: scale(1.05);
        }

        .galeri img:hover {
            transform: scale(1.05);
        }

        h1 {
            text-align: center;
            margin-top: 0;
            padding: 20px;
            color: #333;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav>
        <a href="hal1.html">Home</a>
        <a href="hal2.html">Tongkrongan</a>
        <a href="hal3.html">Moment Foto</a>
    </nav>

    <!-- Konten utama -->
    <div class="konten">
        <h1>Kegiatan</h1>

        <div class="galeri-container">
            <div class="galeri">
                <img src="111.jpg" alt="Moment 1">
                <img src="222.jpg" alt="Moment 2">
                <img src="333.jpg" alt="Moment 3">
                <img src="444.jpg" alt="Moment 4">
                <img src="555.jpg" alt="Moment 5">
                <img src="666.jpg" alt="Moment 6">
            </div>
        </div>

    </div>
</body>

</html>
